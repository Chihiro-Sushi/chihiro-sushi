<!-- @dsCard group="Components" name="Navbar" subtitle="Desktop · con badge carrito" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0A0A0A; font-family: system-ui, sans-serif; }

  header {
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(192,57,43,0.3);
  }
  .inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 16px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
  .logo-rojo { color: #C0392B; }
  .logo-blanco { color: #F5F5F5; }
  nav { display: flex; gap: 32px; }
  nav a { color: #9CA3AF; font-size: 14px; text-decoration: none; }
  nav a:hover { color: #C0392B; }
  nav a.active { color: #C0392B; }
  .cart-btn { position: relative; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; color: #F5F5F5; }
  .cart-badge { position: absolute; top: -2px; right: -2px; background: #C0392B; color: #F5F5F5; font-size: 10px; font-weight: 700; border-radius: 9999px; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; }
  .preview-section { padding: 24px; }
  .label { color: rgba(156,163,175,0.5); font-size: 9px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
  .meta { color: rgba(156,163,175,0.4); font-size: 10px; margin-top: 12px; font-family: monospace; }
</style>
</head>
<body>
  <header>
    <div class="inner">
      <div class="logo">
        <span class="logo-rojo">CHIHIRO</span> <span class="logo-blanco">SUSHI</span>
      </div>
      <nav>
        <a href="#" class="active">Menú</a>
        <a href="#">Nosotros</a>
        <a href="#">Contacto</a>
      </nav>
      <div class="cart-btn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        <span class="cart-badge">4</span>
      </div>
    </div>
  </header>

  <div class="preview-section">
    <div class="label">Estado: fijo en top-0 · z-50 · backdrop-blur</div>
    <div class="meta">
      bg: rgba(#0A0A0A, 95%) · border-bottom: rgba(rojo, 30%) · h-16<br>
      Logo: font-bold · tracking-tight · 22px<br>
      Nav links: text-gris → hover:text-rojo<br>
      Carrito: badge -top-1 -right-1 · bg-rojo
    </div>
  </div>
</body>
</html>
